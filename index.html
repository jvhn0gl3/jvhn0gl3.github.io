    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Profile Stat Animation
            const profileCard = document.getElementById('profile-card');
            if (profileCard) {
                const animateStats = () => {
                    const statValues = profileCard.querySelectorAll('.stat-value[data-value]');
                    statValues.forEach(stat => {
                        const finalValue = parseInt(stat.getAttribute('data-value'), 10);
                        stat.textContent = finalValue.toLocaleString();
                    });
                };
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) { animateStats(); observer.unobserve(entries[0].target); }
                }, { threshold: 0.5 });
                observer.observe(profileCard);
            }
        });
    </script>
