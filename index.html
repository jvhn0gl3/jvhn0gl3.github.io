<!DOCTYPE html>
<html lang="en" class="scroll-smooth scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo | John Ogletree - Digital Creator & Designer</title>
    <meta name="description" content="Welcome to Echo, the personal portfolio of John Ogletree.">
    <meta name="keywords" content="John Ogletree, Portfolio, Web Developer, UI/UX Designer">
    <meta name="author" content="John Ogletree">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="/logo.jpg">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg': '#3B2F2A',
                        'surface': '#4A3E38',
                        'text': '#F0EAD6',
                        'text-light': '#D4C9A8',
                        'heading': '#E07A5F',
                        'accent': '#3D87A6',
                        'border': '#5B4F48',
                    },
                    fontFamily: {
                        mono: ['IBM Plex Mono', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    keyframes: {
                        blink: {
                            '50%': { backgroundColor: 'transparent' }
                        },
                        ping: {
                            '75%, 100%': {
                                transform: 'scale(2)',
                                opacity: '0'
                            }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-5px)' }
                        },
                        glow: {
                            '0%, 100%': { textShadow: '0 0 0px rgba(224,122,95,0)' },
                            '50%': { textShadow: '0 0 8px rgba(224,122,95,0.6)' }
                        }
                    },
                    animation: {
                        blink: 'blink 1s steps(1) infinite',
                        ping: 'ping 1s cubic-bezier(0, 0, 0.2, 1) infinite',
                        float: 'float 3s ease-in-out infinite',
                        glow: 'glow 2s ease-in-out infinite'
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-bg text-text font-mono antialiased">

    <div id="app-root">
        <!-- Content will be dynamically rendered from JSON -->
        <div class="loading-container flex items-center justify-center min-h-screen">
            <div class="text-center">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-accent mb-4"></i>
                <p class="text-text-light">Loading Echo...</p>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="/script.js"></script>
</body>
</html>
