<!doctype html>
<html lang="en" class="scroll-smooth scroll-pt-20">
	<head>
		<title id="site-title">Echo | John Ogletree - Digital Creator & Designer</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Welcome to Echo, the personal portfolio of John Ogletree." />
		<script id="tailwind-cdn" src="https://cdn.tailwindcss.com"></script>
		<script id="tailwind-config">
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							'bg': '#3B2F2A',
							'surface': '#4A3E38',
							'text': '#F0EAD6',
							'text-light': '#D4C9A8',
							'heading': '#E07A5F',
							'accent': '#3D87A6',
							'border': '#5B4F48',
							'tag-bg': 'rgba(61, 135, 166, 0.15)',
						},
						fontFamily: {
							mono: ['IBM Plex Mono', 'monospace'],
						}
					}
				}
			}
		</script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	</head>
	<body class="bg-bg text-text font-mono text-base leading-relaxed m-0 p-0 transition-transform duration-300 ease-in-out flex flex-col min-h-screen">
    
    <div id="navbar-placeholder"></div>

    <div id="page-container">
        <main id="main-content" class="mx-auto px-4 py-4 pb-8 transition-filter duration-300 ease-in-out md:px-6 lg:px-8">
            <section id="hero-section" class="flex min-h-[60vh] flex-col items-center justify-center py-12 text-center">
                <h1 class="text-4xl font-bold text-heading">Crafting Digital Solutions</h1>
            </section>
        </main>
    </div>

    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
                // Re-initialize mobile menu listeners after loading
                initializeMobileMenu();
            });

        function initializeMobileMenu() {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const closeMobileMenuButton = document.getElementById('close-mobile-menu-button');
            const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
            const mobileMenu = document.getElementById('mobile-menu');
            const body = document.body;

            const toggle = () => {
                mobileMenuOverlay.classList.toggle('hidden');
                mobileMenu.classList.toggle('translate-x-full');
                body.classList.toggle('overflow-hidden');
            };

            if (mobileMenuButton) mobileMenuButton.addEventListener('click', toggle);
            if (closeMobileMenuButton) closeMobileMenuButton.addEventListener('click', toggle);
            if (mobileMenuOverlay) mobileMenuOverlay.addEventListener('click', toggle);
        }
    </script>
    </body>
</html>
